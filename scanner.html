<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4b9bda">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Jixels Scanner</title>
  <style>
    :root { --blue: #4b9bda; --ink: #202938; --line: #d9e0ea; --page: #eef2f6; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--page); color: var(--ink); font-family: Arial, Helvetica, sans-serif; }
    main { width: min(640px, calc(100% - 18px)); margin: 0 auto; padding: 18px 0 32px; }
    .panel { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: clamp(14px, 3vw, 18px); display: grid; gap: 12px; box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08); }
    h1 { margin: 0; font-size: 24px; }
    label { display: grid; gap: 6px; font-weight: 800; font-size: 13px; }
    input, select { width: 100%; border: 1px solid #cbd4df; border-radius: 6px; padding: 12px; font: inherit; }
    button, a.button { border: 0; border-radius: 6px; padding: 12px 14px; background: var(--blue); color: #fff; font-weight: 800; text-decoration: none; text-align: center; }
    button.secondary, a.secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .row > * { flex: 1 1 auto; }
    .notice { border: 1px solid var(--line); border-radius: 8px; background: #f8fafc; padding: 12px; font-weight: 700; line-height: 1.4; }
    .person { display: grid; grid-template-columns: 76px 1fr; gap: 12px; align-items: center; border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: #f8fafc; }
    .person img { width: 76px; height: 76px; border-radius: 50%; object-fit: cover; object-position: center top; background: #e5e7eb; }
    .person h2 { margin: 0 0 6px; font-size: 18px; }
    .person dl { margin: 0; display: grid; grid-template-columns: 72px 1fr; gap: 4px 8px; font-size: 13px; }
    .person dt { font-weight: 800; color: #64748b; }
    .person dd { margin: 0; font-weight: 700; }
    .danger { border-color: #fecaca; background: #fff1f2; color: #991b1b; }
    .ok { border-color: #bbf7d0; background: #f0fdf4; color: #14532d; }
    video { width: 100%; border-radius: 8px; background: #111827; max-height: 60vh; object-fit: cover; }
    .hidden { display: none !important; }

    @media (max-width: 640px) {
      main { width: min(100% - 12px, 640px); padding-top: 10px; }
      h1 { font-size: 22px; }
      .row { flex-direction: column; }
      .row > * { width: 100%; }
      button, a.button { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Worker Sign In/Out</h1>
      <div class="notice" id="deviceNotice">Checking scanner phone...</div>
      <div class="row">
        <button type="button" class="secondary hidden" id="installBtn">Install App</button>
      </div>
      <div id="setupBox" class="hidden">
        <label>Scanner owner/name
          <input id="setupDeviceName" autocomplete="off" placeholder="Example: Reception phone">
        </label>
        <label>Registered phone number
          <input id="setupPhone" inputmode="tel" autocomplete="tel" placeholder="Phone number admin sent link to">
        </label>
        <label>Set scanner password
          <input id="setupScannerPassword" type="password" autocomplete="new-password" placeholder="At least 4 characters">
        </label>
        <button type="button" id="setupBtn">Set Up Scanner Phone</button>
      </div>
      <div id="loginBox">
        <label>Scanner password
          <input id="scannerPassword" type="password" autocomplete="current-password" placeholder="Enter scanner password">
        </label>
        <button type="button" id="loginBtn">Unlock Scanner</button>
      </div>
      <div id="scannerControls" class="hidden">
        <label>Card QR token or scanned URL
          <input id="scanToken" autocomplete="off" required placeholder="Scan or paste worker card QR result">
        </label>
        <div class="row">
          <button type="button" class="secondary" id="cameraBtn">Open Camera Scanner</button>
          <button type="button" class="secondary hidden" id="stopCameraBtn">Stop Camera</button>
        </div>
        <video class="hidden" id="cameraPreview" playsinline muted></video>
        <div class="person hidden" id="personBox">
          <img id="personPhoto" alt="">
          <div>
            <h2 id="personName"></h2>
            <dl id="personDetails"></dl>
          </div>
        </div>
        <label>Action
          <select id="scanAction">
            <option value="sign-in">Sign In</option>
            <option value="sign-out">Sign Out</option>
          </select>
        </label>
        <button type="button" id="recordBtn">Confirm Sign In</button>
        <details>
          <summary>Change scanner password</summary>
          <label>Current password<input id="currentScannerPassword" type="password"></label>
          <label>New password<input id="newScannerPassword" type="password"></label>
          <button type="button" class="secondary" id="changePasswordBtn">Change Password</button>
        </details>
      </div>
      <div class="notice hidden" id="scanNotice"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const state = {
      deviceId: localStorage.getItem('jixelsScannerDeviceId') || '',
      scannerSession: sessionStorage.getItem('jixelsScannerSession') || '',
      installPrompt: null,
      cameraStream: null,
      scanTimer: null,
      cameraCanvas: document.createElement('canvas')
    };
    const inviteToken = new URLSearchParams(window.location.search).get('invite') || '';
    const els = {
      deviceNotice: document.getElementById('deviceNotice'),
      installBtn: document.getElementById('installBtn'),
      setupBox: document.getElementById('setupBox'),
      setupDeviceName: document.getElementById('setupDeviceName'),
      setupPhone: document.getElementById('setupPhone'),
      setupScannerPassword: document.getElementById('setupScannerPassword'),
      setupBtn: document.getElementById('setupBtn'),
      loginBox: document.getElementById('loginBox'),
      scannerPassword: document.getElementById('scannerPassword'),
      loginBtn: document.getElementById('loginBtn'),
      scannerControls: document.getElementById('scannerControls'),
      scanToken: document.getElementById('scanToken'),
      scanAction: document.getElementById('scanAction'),
      cameraBtn: document.getElementById('cameraBtn'),
      stopCameraBtn: document.getElementById('stopCameraBtn'),
      cameraPreview: document.getElementById('cameraPreview'),
      personBox: document.getElementById('personBox'),
      personPhoto: document.getElementById('personPhoto'),
      personName: document.getElementById('personName'),
      personDetails: document.getElementById('personDetails'),
      recordBtn: document.getElementById('recordBtn'),
      currentScannerPassword: document.getElementById('currentScannerPassword'),
      newScannerPassword: document.getElementById('newScannerPassword'),
      changePasswordBtn: document.getElementById('changePasswordBtn'),
      scanNotice: document.getElementById('scanNotice')
    };

    function ensureScannerDeviceId() {
      if (!state.deviceId) {
        const randomId = Math.random().toString(36).slice(2, 10).toUpperCase();
        state.deviceId = `JIX-SCAN-${randomId}`;
        localStorage.setItem('jixelsScannerDeviceId', state.deviceId);
      }
      return state.deviceId;
    }

    function isInstalledApp() {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }

    function isIOSDevice() {
      return /iphone|ipad|ipod/i.test(window.navigator.userAgent.toLowerCase());
    }

    function showInstallGuide() {
      const message = isIOSDevice()
        ? 'On iPhone/iPad, tap Share and choose “Add to Home Screen”. On Android, use the browser menu and choose “Install app” or “Add to Home Screen”.'
        : 'Use your browser menu (⋮) and choose “Install app” or “Add to Home Screen”.';
      els.scanNotice.textContent = message;
      els.scanNotice.className = 'notice danger';
    }

    function updateDeviceNotice() {
      if (inviteToken && !state.scannerSession) {
        els.deviceNotice.textContent = 'Set up this phone as a Jixels scanner phone.';
        els.deviceNotice.className = 'notice ok';
        els.setupBox.classList.remove('hidden');
        els.loginBox.classList.add('hidden');
        els.scannerControls.classList.add('hidden');
        return;
      }
      if (state.deviceId) {
        if (state.scannerSession && !isInstalledApp()) {
          els.deviceNotice.textContent = 'Install and open the Scanner App before scanning worker ID cards.';
          els.deviceNotice.className = 'notice danger';
          els.installBtn.textContent = state.installPrompt ? 'Install App' : (isIOSDevice() ? 'Add to Home Screen' : 'Install App');
          els.installBtn.classList.remove('hidden');
          els.setupBox.classList.add('hidden');
          els.loginBox.classList.add('hidden');
          els.scannerControls.classList.add('hidden');
          return;
        }
        els.installBtn.classList.add('hidden');
        els.deviceNotice.textContent = state.scannerSession ? 'Scanner unlocked on this registered phone.' : 'This phone is registered. Enter scanner password to continue.';
        els.deviceNotice.className = 'notice ok';
        els.setupBox.classList.add('hidden');
        els.loginBox.classList.toggle('hidden', Boolean(state.scannerSession));
        els.scannerControls.classList.toggle('hidden', !state.scannerSession);
        return;
      }
      els.deviceNotice.textContent = 'This phone is not registered yet. Ask admin to send a scanner setup link to this phone.';
      els.deviceNotice.className = 'notice danger';
      els.setupBox.classList.add('hidden');
      els.loginBox.classList.add('hidden');
      els.scannerControls.classList.add('hidden');
    }

    function currentLocation() {
      if (!navigator.geolocation) return Promise.resolve({});
      const capture = (options) => new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          (position) => resolve({
            latitude: position.coords.latitude,
            longitude: position.coords.longitude,
            locationAccuracy: position.coords.accuracy
          }),
          () => resolve({}),
          options
        );
      });
      return Promise.all([
        capture({ enableHighAccuracy: false, timeout: 3500, maximumAge: 15000 }),
        capture({ enableHighAccuracy: true, timeout: 10000, maximumAge: 0 })
      ]).then((locations) => locations
        .filter((location) => location.latitude !== undefined)
        .sort((a, b) => Number(a.locationAccuracy || Infinity) - Number(b.locationAccuracy || Infinity))[0] || {});
    }

    async function readJson(response) {
      const text = await response.text();
      const data = text ? JSON.parse(text) : {};
      if (!response.ok) throw new Error(data.error || 'Request failed.');
      return data;
    }

    async function scannerLogin() {
      if (!state.deviceId) throw new Error('This phone is not registered for scanning.');
      const response = await fetch('/api/scanner-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ deviceId: state.deviceId, password: els.scannerPassword.value })
      });
      const data = await readJson(response);
      state.scannerSession = data.scannerSession || '';
      sessionStorage.setItem('jixelsScannerSession', state.scannerSession);
      els.scannerPassword.value = '';
      updateDeviceNotice();
    }

    async function acceptScannerInvite() {
      if (!inviteToken) throw new Error('Scanner setup link is missing.');
      const response = await fetch('/api/scanner-invite/accept', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          invite: inviteToken,
          deviceId: ensureScannerDeviceId(),
          deviceName: els.setupDeviceName.value.trim() || 'Scanner phone',
          ownerName: els.setupDeviceName.value.trim(),
          phone: els.setupPhone.value.trim(),
          scannerPassword: els.setupScannerPassword.value
        })
      });
      const data = await readJson(response);
      state.scannerSession = data.scannerSession || '';
      sessionStorage.setItem('jixelsScannerSession', state.scannerSession);
      els.setupScannerPassword.value = '';
      history.replaceState(null, '', '/scanner');
      updateDeviceNotice();
      els.scanNotice.textContent = 'This phone is ready. Install and open the Scanner App before scanning worker ID cards.';
      els.scanNotice.className = 'notice ok';
    }

    async function loadPersonDetails() {
      const token = els.scanToken.value.trim();
      if (!token) throw new Error('Scan or paste the worker card QR first.');
      const response = await fetch(`/api/verify?token=${encodeURIComponent(token)}`);
      const data = await readJson(response);
      const card = data.card || {};
      if (!card.valid) throw new Error(card.invalidReason || 'This worker card is not valid.');
      els.personName.textContent = card.name || '';
      els.personPhoto.src = card.photo || '';
      els.personPhoto.classList.toggle('hidden', !card.photo);
      els.personDetails.innerHTML = `
        <dt>ID</dt><dd>${card.id || ''}</dd>
        <dt>Position</dt><dd>${card.position || ''}</dd>
        <dt>Branch</dt><dd>${card.branch || ''}</dd>
        <dt>Status</dt><dd>${card.status || ''}</dd>
      `;
      els.personBox.classList.remove('hidden');
      return card;
    }

    async function recordScan() {
      if (!state.deviceId || !state.scannerSession) throw new Error('Enter scanner password first.');
      if (!isInstalledApp()) throw new Error('Open the installed Scanner App before recording scans.');
      await loadPersonDetails();
      els.scanNotice.textContent = 'Capturing GPS...';
      els.scanNotice.className = 'notice';
      const location = await currentLocation();
      const response = await fetch('/api/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: els.scanToken.value.trim(),
          action: els.scanAction.value,
          deviceId: state.deviceId,
          scannerSession: state.scannerSession,
          ...location
        })
      });
      const data = await readJson(response);
      els.scanNotice.textContent = data.message ? `${data.message} Sent to admin attendance.` : 'Scan sent to admin attendance.';
      els.scanNotice.className = 'notice ok';
      els.scanToken.value = '';
      els.personBox.classList.add('hidden');
    }

    async function changeScannerPassword() {
      if (!state.deviceId || !state.scannerSession) throw new Error('Enter scanner password first.');
      const response = await fetch('/api/scanner-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          deviceId: state.deviceId,
          scannerSession: state.scannerSession,
          currentPassword: els.currentScannerPassword.value,
          newPassword: els.newScannerPassword.value
        })
      });
      const data = await readJson(response);
      state.scannerSession = data.scannerSession || state.scannerSession;
      sessionStorage.setItem('jixelsScannerSession', state.scannerSession);
      els.currentScannerPassword.value = '';
      els.newScannerPassword.value = '';
      els.scanNotice.textContent = 'Scanner password changed.';
      els.scanNotice.className = 'notice ok';
    }

    async function startCamera() {
      if (!navigator.mediaDevices?.getUserMedia) throw new Error('Camera access is not available on this browser. Use the phone camera/scanner app and paste the worker card URL.');
      const detector = 'BarcodeDetector' in window ? new BarcodeDetector({ formats: ['qr_code'] }) : null;
      if (!detector && !window.jsQR) throw new Error('Camera QR scanning is still loading. Wait a moment, then try again. You can also paste the worker card URL.');
      state.cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      els.cameraPreview.srcObject = state.cameraStream;
      els.cameraPreview.classList.remove('hidden');
      els.stopCameraBtn.classList.remove('hidden');
      await els.cameraPreview.play();
      state.scanTimer = setInterval(async () => {
        try {
          let scannedValue = '';
          if (detector) {
            const codes = await detector.detect(els.cameraPreview);
            scannedValue = codes[0]?.rawValue || '';
          } else if (els.cameraPreview.videoWidth && els.cameraPreview.videoHeight) {
            state.cameraCanvas.width = els.cameraPreview.videoWidth;
            state.cameraCanvas.height = els.cameraPreview.videoHeight;
            const context = state.cameraCanvas.getContext('2d');
            context.drawImage(els.cameraPreview, 0, 0, state.cameraCanvas.width, state.cameraCanvas.height);
            const imageData = context.getImageData(0, 0, state.cameraCanvas.width, state.cameraCanvas.height);
            scannedValue = window.jsQR(imageData.data, imageData.width, imageData.height)?.data || '';
          }
          if (scannedValue) {
            els.scanToken.value = scannedValue;
            stopCamera();
            loadPersonDetails().catch((error) => {
              els.scanNotice.textContent = error.message || 'Unable to load worker details.';
              els.scanNotice.className = 'notice danger';
            });
          }
        } catch {}
      }, 700);
    }

    function stopCamera() {
      if (state.scanTimer) clearInterval(state.scanTimer);
      state.scanTimer = null;
      if (state.cameraStream) state.cameraStream.getTracks().forEach((track) => track.stop());
      state.cameraStream = null;
      els.cameraPreview.classList.add('hidden');
      els.stopCameraBtn.classList.add('hidden');
    }

    els.recordBtn.addEventListener('click', () => recordScan().catch((error) => {
      els.scanNotice.textContent = error.message || 'Unable to record scan.';
      els.scanNotice.className = 'notice danger';
    }));
    els.loginBtn.addEventListener('click', () => scannerLogin().catch((error) => {
      els.scanNotice.textContent = error.message || 'Unable to unlock scanner.';
      els.scanNotice.className = 'notice danger';
    }));
    els.setupBtn.addEventListener('click', () => acceptScannerInvite().catch((error) => {
      els.scanNotice.textContent = error.message || 'Unable to set up scanner phone.';
      els.scanNotice.className = 'notice danger';
    }));
    els.changePasswordBtn.addEventListener('click', () => changeScannerPassword().catch((error) => {
      els.scanNotice.textContent = error.message || 'Unable to change scanner password.';
      els.scanNotice.className = 'notice danger';
    }));
    els.scanToken.addEventListener('change', () => loadPersonDetails().catch((error) => {
      els.scanNotice.textContent = error.message || 'Unable to load worker details.';
      els.scanNotice.className = 'notice danger';
    }));
    els.scanAction.addEventListener('change', () => {
      els.recordBtn.textContent = els.scanAction.value === 'sign-out' ? 'Confirm Sign Out' : 'Confirm Sign In';
    });
    els.cameraBtn.addEventListener('click', () => startCamera().catch((error) => {
      els.scanNotice.textContent = error.message || 'Unable to open camera.';
      els.scanNotice.className = 'notice danger';
    }));
    els.stopCameraBtn.addEventListener('click', stopCamera);
    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      state.installPrompt = event;
      els.installBtn.classList.remove('hidden');
    });
    els.installBtn.addEventListener('click', async () => {
      if (state.installPrompt) {
        state.installPrompt.prompt();
        await state.installPrompt.userChoice.catch(() => {});
        state.installPrompt = null;
        els.installBtn.classList.add('hidden');
        return;
      }
      showInstallGuide();
    });
    window.addEventListener('appinstalled', () => {
      state.installPrompt = null;
      els.installBtn.classList.add('hidden');
      els.scanNotice.textContent = 'Scanner app installed. Open it to continue scanning.';
      els.scanNotice.className = 'notice ok';
    });
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
      navigator.serviceWorker.register('/sw.js').then((registration) => {
        registration.update().catch(() => {});
      }).catch(() => {});
    }
    updateDeviceNotice();
  </script>
</body>
</html>
